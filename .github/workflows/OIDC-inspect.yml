name: Inspect GitHub OIDC Token

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Request and Decode OIDC Token
        run: |
          echo "Requesting GitHub OIDC token..."

          TOKEN=$(curl -s \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=vault-demo" \
            | jq -r '.value')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to obtain OIDC token"
            exit 1
          fi

          echo "OIDC token obtained successfully."

          PAYLOAD=$(echo "$TOKEN" | cut -d'.' -f2)

          PAYLOAD=$(echo "$PAYLOAD" | tr '_-' '/+')
          while [ $(( ${#PAYLOAD} % 4 )) -ne 0 ]; do
            PAYLOAD="${PAYLOAD}="
          done

          echo "Decoded JWT Claims:"
          echo "$PAYLOAD" | base64 --decode | jq .
